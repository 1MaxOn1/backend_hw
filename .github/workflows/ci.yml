name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      rabbitmq:
        image: rabbitmq:3
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pytest pytest-asyncio pytest-cov httpx aio-pika sqlalchemy asyncpg
          pip install -r server/requirements.txt
        pip install -r consumer/requirements.txt

    - name: Run tests
      env:
        DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/testdb
        RABBITMQ_URL: amqp://guest:guest@localhost/
      run: |
        pytest --cov=server --cov=consumer --cov-report=term --cov-fail-under=90

    - name: Upload coverage to Codecov 
      uses: codecov/codecov-action@v3